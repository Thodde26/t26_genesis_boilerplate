name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Flache ZIP bauen"
        run: |
          # Finde den Ordner, in dem die info.php liegt
          INFO_PATH=$(find . -name "info.php" | head -n 1)
          INFO_DIR=$(dirname "$INFO_PATH")
          
          echo "Gehe in Ordner: $INFO_DIR"
          cd "$INFO_DIR"
          
          # Zippe den reinen Inhalt (.)
          zip -r "$GITHUB_WORKSPACE/t26_genesis_boilerplate.zip" . -x "*.git*" -x "*.github*"

      - name: "3. Roentgenblick - ZIP-Inhalt pruefen"
        run: |
          echo "Das ist der exakte Inhalt der fertigen ZIP-Datei:"
          unzip -l "$GITHUB_WORKSPACE/t26_genesis_boilerplate.zip"

      - name: "4. ZIP an Release anhaengen"
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
