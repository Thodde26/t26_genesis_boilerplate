name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Die magische, flache ZIP bauen (Findet info.php automatisch)
        run: |
          # 1. Wir suchen dynamisch, wo genau deine info.php liegt
          INFO_PATH=$(find . -name "info.php" | head -n 1)
          INFO_DIR=$(dirname "$INFO_PATH")
          
          echo "info.php gefunden in: $INFO_DIR"
          
          # 2. Wir wechseln EXAKT in diesen Ordner (egal wie tief er versteckt ist)
          cd "$INFO_DIR"
          
          # 3. Wir zippen nur den nackten Inhalt (*) und speichern die ZIP im Hauptverzeichnis
          zip -r "$GITHUB_WORKSPACE/t26_genesis_boilerplate.zip" * -x "*.git*" -x "*.github*"

      - name: 3. ZIP an Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
