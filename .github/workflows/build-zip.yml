name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Die absolut flache ZIP bauen
        run: |
          # Der Stern (*) nimmt nur den nackten Inhalt des Repositories!
          zip -r t26_genesis_boilerplate.zip * -x ".git/*" -x ".github/*"

      - name: 3. ZIP an Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
