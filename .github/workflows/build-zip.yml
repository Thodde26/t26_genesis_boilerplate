name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Flache ZIP-Struktur bauen (Narrensicher)
        run: |
          # Zippt alles flach, aber ignoriert Git-Dateien UND die eigene ZIP-Datei!
          zip -r t26_genesis_boilerplate.zip . -x "*.git*" -x "*.github*" -x "t26_genesis_boilerplate.zip"

      - name: 3. ZIP an das GitHub Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
