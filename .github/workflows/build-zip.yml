name: Build WBCE Module ZIP
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Flache ZIP aus dem Modulordner bauen
        run: |
          # Direkt in den Modulordner wechseln (Pfad anpassen!)
          cd t26_genesis_boilerplate

          # Versteckte Dateien mit einbeziehen
          shopt -s dotglob

          # Inhalt OHNE umschließenden Ordner zippen
          zip -r ../t26_genesis_boilerplate.zip *

      - name: 3. ZIP an Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
