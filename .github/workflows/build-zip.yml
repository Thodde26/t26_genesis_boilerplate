name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Die absolut flache ZIP bauen (WBCE Master-Fix)
        run: |
          # 1. Wir bauen einen sauberen Quarantäne-Ordner
          mkdir temp_build
          rsync -a --exclude='.git' --exclude='.github' --exclude='temp_build' ./ temp_build/
          
          # 2. Wir gehen IN den Ordner
          cd temp_build
          
          # 3. Wir zwingen Linux, auch versteckte Dateien zu sehen
          shopt -s dotglob
          
          # 4. Der Stern (*) ist der Trick! Er nimmt NUR Dateien, keinen Ordnerkontext.
          zip -r ../t26_genesis_boilerplate.zip *
          
          # 5. Zurück ins Hauptverzeichnis
          cd ..

      - name: 3. ZIP an Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
