name: Build WBCE Module ZIP

on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout Code"
        uses: actions/checkout@v4

      - name: "2. Ordner-Struktur bauen (Der WAHRE WBCE-Weg)"
        run: |
          # 1. Den exakten Ordnernamen erstellen, den WBCE braucht
          mkdir t26_genesis_boilerplate
          
          # 2. Dateien reinkopieren (ohne Git-Kram und ohne sich selbst)
          rsync -r --exclude='.git' --exclude='.github' --exclude='t26_genesis_boilerplate' ./ t26_genesis_boilerplate/
          
          # 3. Wir zippen den ORDNER (Nicht flach!)
          zip -r t26_genesis_boilerplate.zip t26_genesis_boilerplate/

      - name: "3. ZIP als Test-Download bereitstellen (Fuer manuellen Play-Button)"
        uses: actions/upload-artifact@v4
        with:
          name: t26_genesis_boilerplate_test_zip
          path: t26_genesis_boilerplate.zip

      - name: "4. ZIP an Release anhaengen (NUR bei echtem Release)"
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
