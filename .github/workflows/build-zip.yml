name: Build WBCE Module ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Perfekte ZIP-Struktur bauen (WBCE Fix)
        run: |
          # 1. Temporären Ordner erstellen
          mkdir t26_genesis_boilerplate
          
          # 2. Dateien reinkopieren (ohne GitHub-Müll)
          rsync -r --exclude='.git' --exclude='.github' --exclude='t26_genesis_boilerplate' ./ t26_genesis_boilerplate/
          
          # 3. 🔥 WBCE FIX: In den Ordner WECHSELN und den Inhalt "flach" zippen
          cd t26_genesis_boilerplate
          zip -r ../t26_genesis_boilerplate.zip .
          cd ..

      - name: 3. ZIP an das GitHub Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: t26_genesis_boilerplate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
